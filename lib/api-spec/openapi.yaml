openapi: 3.1.0
info:
  title: Api
  version: 0.2.0
  description: MeTime Stories Football Academy Player Portal API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: academies
    description: Academy operations
  - name: players
    description: Player operations
  - name: journey
    description: Journey response operations
  - name: stakeholders
    description: Stakeholder (parent/friend/staff) operations
  - name: admin
    description: Admin dashboard operations
  - name: storage
    description: Object storage operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /academies:
    get:
      operationId: listAcademies
      tags: [academies]
      summary: List all academies
      responses:
        "200":
          description: List of academies
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Academy"

  /players:
    post:
      operationId: registerPlayer
      tags: [players]
      summary: Register a new player
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterPlayerInput"
      responses:
        "201":
          description: Player registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Player"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /players/{playerId}:
    get:
      operationId: getPlayer
      tags: [players]
      summary: Get player by ID
      parameters:
        - name: playerId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Player found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Player"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /players/{playerId}/journey:
    post:
      operationId: saveJourneyResponses
      tags: [journey]
      summary: Save journey responses
      parameters:
        - name: playerId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveJourneyResponsesInput"
      responses:
        "200":
          description: Saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SaveJourneyResponsesResult"

  /players/{playerId}/journey/status:
    patch:
      operationId: completeJourney
      tags: [journey]
      summary: Mark journey complete
      parameters:
        - name: playerId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompleteJourneyResult"

  /players/{playerId}/stakeholder-links:
    get:
      operationId: getStakeholderLinks
      tags: [stakeholders]
      summary: Get all stakeholder links for a player
      parameters:
        - name: playerId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Stakeholder links
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StakeholderLink"
    post:
      operationId: createStakeholderLinks
      tags: [stakeholders]
      summary: Create stakeholder links for a player
      parameters:
        - name: playerId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStakeholderLinksInput"
      responses:
        "201":
          description: Links created
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StakeholderLink"

  /stakeholder/{code}:
    get:
      operationId: getStakeholderByCode
      tags: [stakeholders]
      summary: Get stakeholder info by code
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Stakeholder info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StakeholderInfo"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: submitStakeholderResponses
      tags: [stakeholders]
      summary: Submit stakeholder responses
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitStakeholderResponsesInput"
      responses:
        "201":
          description: Submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubmitResult"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/players:
    get:
      operationId: adminListPlayers
      tags: [admin]
      summary: Admin list all players
      parameters:
        - name: passcode
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Players list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminPlayerSummary"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/players/{playerId}:
    get:
      operationId: adminGetPlayer
      tags: [admin]
      summary: Admin get full player profile
      parameters:
        - name: playerId
          in: path
          required: true
          schema:
            type: string
        - name: passcode
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Full profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminPlayerProfile"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /storage/uploads/request-url:
    post:
      operationId: requestUploadUrl
      tags: [storage]
      summary: Request a presigned upload URL
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestUploadUrlBody"
      responses:
        "200":
          description: Presigned URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequestUploadUrlResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]

    Academy:
      type: object
      properties:
        id:
          type: integer
        key:
          type: string
        name:
          type: string
        logoText:
          type: string
        primaryColor:
          type: string
        secondaryColor:
          type: string
        welcomeMessage:
          type: string
      required: [id, key, name, logoText, primaryColor, secondaryColor, welcomeMessage]

    RegisterPlayerInput:
      type: object
      properties:
        playerName:
          type: string
          minLength: 2
        age:
          type: integer
          minimum: 6
          maximum: 21
        shirtNumber:
          type: integer
          minimum: 1
          maximum: 99
        academyKey:
          type: string
        position:
          type: string
      required: [playerName, age, shirtNumber, academyKey, position]

    Player:
      type: object
      properties:
        id:
          type: string
        playerName:
          type: string
        age:
          type: integer
        shirtNumber:
          type: integer
        academyKey:
          type: string
        academyName:
          type: string
        position:
          type: string
        accessCode:
          type: string
        status:
          type: string
        createdAt:
          type: string
      required: [id, playerName, age, shirtNumber, academyKey, academyName, position, accessCode, status, createdAt]

    JourneyResponseItem:
      type: object
      properties:
        stage:
          type: string
        questionNumber:
          type: integer
        questionText:
          type: string
        answerText:
          type: string
        audioUrl:
          type: string
          nullable: true
        mediaUrls:
          type: array
          items:
            type: string
      required: [stage, questionNumber, questionText, answerText]

    SaveJourneyResponsesInput:
      type: object
      properties:
        responses:
          type: array
          items:
            $ref: "#/components/schemas/JourneyResponseItem"
      required: [responses]

    SaveJourneyResponsesResult:
      type: object
      properties:
        saved:
          type: integer
      required: [saved]

    CompleteJourneyResult:
      type: object
      properties:
        status:
          type: string
      required: [status]

    StakeholderLink:
      type: object
      properties:
        id:
          type: integer
        playerId:
          type: string
        type:
          type: string
        label:
          type: string
        code:
          type: string
        submitted:
          type: boolean
        createdAt:
          type: string
      required: [id, playerId, type, label, code, submitted, createdAt]

    CreateStakeholderLinksInput:
      type: object
      properties:
        parentCount:
          type: integer
          minimum: 1
          maximum: 4
        friendCount:
          type: integer
          minimum: 0
          maximum: 6
      required: [parentCount, friendCount]

    StakeholderInfo:
      type: object
      properties:
        linkId:
          type: integer
        playerId:
          type: string
        playerName:
          type: string
        academyName:
          type: string
        position:
          type: string
        type:
          type: string
        label:
          type: string
        submitted:
          type: boolean
      required: [linkId, playerId, playerName, academyName, position, type, label, submitted]

    StakeholderResponseItem:
      type: object
      properties:
        questionNumber:
          type: integer
        questionText:
          type: string
        answerText:
          type: string
        audioUrl:
          type: string
          nullable: true
        mediaUrls:
          type: array
          items:
            type: string
      required: [questionNumber, questionText, answerText]

    SubmitStakeholderResponsesInput:
      type: object
      properties:
        responses:
          type: array
          items:
            $ref: "#/components/schemas/StakeholderResponseItem"
      required: [responses]

    SubmitResult:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required: [success, message]

    AdminPlayerSummary:
      type: object
      properties:
        id:
          type: string
        playerName:
          type: string
        academyName:
          type: string
        age:
          type: integer
        position:
          type: string
        status:
          type: string
        stakeholderCounts:
          type: object
          properties:
            total:
              type: integer
            submitted:
              type: integer
          required: [total, submitted]
        createdAt:
          type: string
      required: [id, playerName, academyName, age, position, status, stakeholderCounts, createdAt]

    AdminPlayerProfile:
      type: object
      properties:
        player:
          $ref: "#/components/schemas/Player"
        journeyResponses:
          type: array
          items:
            $ref: "#/components/schemas/JourneyResponseItem"
        stakeholderLinks:
          type: array
          items:
            $ref: "#/components/schemas/StakeholderLink"
        stakeholderResponses:
          type: array
          items:
            $ref: "#/components/schemas/AdminStakeholderResponse"
      required: [player, journeyResponses, stakeholderLinks, stakeholderResponses]

    AdminStakeholderResponse:
      type: object
      properties:
        stakeholderLinkId:
          type: integer
        type:
          type: string
        label:
          type: string
        responses:
          type: array
          items:
            $ref: "#/components/schemas/StakeholderResponseItem"
      required: [stakeholderLinkId, type, label, responses]

    RequestUploadUrlBody:
      type: object
      properties:
        name:
          type: string
        size:
          type: integer
        contentType:
          type: string
      required: [name, size, contentType]

    RequestUploadUrlResponse:
      type: object
      properties:
        uploadURL:
          type: string
        objectPath:
          type: string
      required: [uploadURL, objectPath]
